name: Build and Release Executables

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Executables
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm ci

      - name: Build Executables with pkg
        run: npx pkg . -o deepsproxy

      - name: Upload Windows Executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./deepsproxy-win.exe
          asset_name: DeepsProxy-Windows.exe
          asset_content_type: application/vnd.microsoft.portable-executable

      - name: Upload macOS (x64) Executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./deepsproxy-macos
          asset_name: DeepsProxy-macOS
          asset_content_type: application/octet-stream

      - name: Upload Linux Executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./deepsproxy-linux
          asset_name: DeepsProxy-Linux
          asset_content_type: application/octet-stream
