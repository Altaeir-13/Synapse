version: '3.8'
services:
  deepsproxy:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - PLAYWRIGHT_HEADLESS=true
    volumes:
      - ./.env.enc:/app/.env.enc
      - ./deepseek_profile.enc:/app/deepseek_profile.enc
      - ./kimi_profile.enc:/app/kimi_profile.enc
      - ./glm_profile.enc:/app/glm_profile.enc
      - ./mimo_profile.enc:/app/mimo_profile.enc
      - ./huggingface_profile.enc:/app/huggingface_profile.enc
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
